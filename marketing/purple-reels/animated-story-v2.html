<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0a0a0a;
    font-family: -apple-system, system-ui, 'Helvetica Neue', sans-serif;
    color: white;
  }

  .scene {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .scene.active { opacity: 1; }

  .scene-text {
    font-size: 72px;
    font-weight: 700;
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    text-align: center;
    line-height: 1.2;
    padding: 0 80px;
    letter-spacing: -0.02em;
  }
  .scene-text.show {
    opacity: 1;
    transform: translateY(0);
  }
  .scene-subtext {
    font-size: 48px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    text-align: center;
    margin-top: 20px;
    padding: 0 80px;
    letter-spacing: -0.01em;
  }
  .scene-subtext.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* ===== SCENE 1: Camera Misfire ===== */
  #scene1 {
    background: radial-gradient(ellipse at 50% 45%, #1a1a2a 0%, #0a0a0a 70%);
  }

  /* ===== SCENE 2: Lost Photos ===== */
  #scene2 {
    background: #0a0a0a;
  }
  .photo-fragments {
    position: absolute;
    width: 100%; height: 100%;
  }
  .photo-frag {
    position: absolute;
    border-radius: 8px;
    opacity: 0;
    transition: all 1.5s ease-out;
  }
  .photo-frag.scatter {
    opacity: 0;
  }
  .photo-frag:nth-child(1) {
    width: 160px; height: 200px; background: linear-gradient(135deg, #3a3a4a, #2a2a3a);
    top: 25%; left: 20%; opacity: 0.35; transform: rotate(-5deg);
  }
  .photo-frag:nth-child(2) {
    width: 140px; height: 180px; background: linear-gradient(135deg, #4a3a3a, #3a2a2a);
    top: 35%; right: 18%; opacity: 0.3; transform: rotate(8deg);
  }
  .photo-frag:nth-child(3) {
    width: 120px; height: 160px; background: linear-gradient(135deg, #3a4a3a, #2a3a2a);
    top: 55%; left: 35%; opacity: 0.25; transform: rotate(-12deg);
  }
  .photo-frag:nth-child(4) {
    width: 100px; height: 130px; background: linear-gradient(135deg, #4a4a3a, #3a3a2a);
    top: 20%; left: 55%; opacity: 0.2; transform: rotate(15deg);
  }
  .photo-frag.scatter:nth-child(1) { transform: translate(-200px, 400px) rotate(-45deg) scale(0.3); }
  .photo-frag.scatter:nth-child(2) { transform: translate(200px, 300px) rotate(35deg) scale(0.2); }
  .photo-frag.scatter:nth-child(3) { transform: translate(-150px, 500px) rotate(-60deg) scale(0.15); }
  .photo-frag.scatter:nth-child(4) { transform: translate(250px, 450px) rotate(50deg) scale(0.1); }

  /* ===== SCENE 3: So I flew back ===== */
  #scene3 {
    background: radial-gradient(ellipse at 50% 50%, #1a1020 0%, #0a0a0a 70%);
  }

  /* ===== SCENE 4: Scooter ===== */
  #scene4 {
    background: linear-gradient(180deg, #040418 0%, #0a0a30 20%, #141445 40%, #1a1a3a 65%, #222 100%);
  }
  .stars {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 50%;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s ease-in-out infinite;
  }
  .star:nth-child(1) { width: 6px; height: 6px; top: 5%; left: 10%; }
  .star:nth-child(2) { width: 4px; height: 4px; top: 8%; left: 35%; animation-delay: 0.5s; }
  .star:nth-child(3) { width: 5px; height: 5px; top: 3%; left: 62%; animation-delay: 1s; }
  .star:nth-child(4) { width: 8px; height: 8px; top: 12%; left: 22%; animation-delay: 0.3s; }
  .star:nth-child(5) { width: 4px; height: 4px; top: 10%; left: 50%; animation-delay: 0.8s; }
  .star:nth-child(6) { width: 6px; height: 6px; top: 18%; left: 78%; animation-delay: 1.2s; }
  .star:nth-child(7) { width: 5px; height: 5px; top: 6%; left: 88%; animation-delay: 0.4s; }
  .star:nth-child(8) { width: 7px; height: 7px; top: 20%; left: 43%; animation-delay: 0.7s; }
  .star:nth-child(9) { width: 3px; height: 3px; top: 2%; left: 75%; animation-delay: 1.5s; }
  .star:nth-child(10) { width: 5px; height: 5px; top: 15%; left: 6%; animation-delay: 0.2s; }
  .star:nth-child(11) { width: 4px; height: 4px; top: 25%; left: 55%; animation-delay: 0.9s; }
  .star:nth-child(12) { width: 6px; height: 6px; top: 22%; left: 92%; animation-delay: 1.3s; }

  /* Moon */
  .moon {
    position: absolute;
    top: 6%; right: 10%;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fffde8, #e8d888);
    box-shadow: 0 0 60px rgba(255,253,200,0.25), 0 0 120px rgba(255,253,200,0.1);
  }
  .moon-crater {
    position: absolute;
    border-radius: 50%;
    background: rgba(0,0,0,0.08);
  }
  .moon-crater:nth-child(1) { width: 20px; height: 20px; top: 25px; left: 30px; }
  .moon-crater:nth-child(2) { width: 14px; height: 14px; top: 50px; left: 55px; }
  .moon-crater:nth-child(3) { width: 10px; height: 10px; top: 35px; left: 15px; }

  .time-big {
    position: absolute;
    top: 120px;
    font-size: 130px;
    font-weight: 800;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.05em;
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.5s ease;
    text-shadow: 0 0 40px rgba(255,255,255,0.15);
  }
  .time-big.show { opacity: 1; transform: translateY(0); }

  .location-label {
    position: absolute;
    top: 270px;
    font-size: 42px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0;
    transition: all 0.5s ease;
  }
  .location-label.show { opacity: 1; }

  /* Palm tree silhouettes */
  .palm-tree {
    position: absolute;
    bottom: 340px;
  }
  .palm-trunk {
    width: 12px;
    background: #111;
    border-radius: 6px;
    margin: 0 auto;
  }
  .palm-fronds {
    position: relative;
    width: 100%; display: flex; justify-content: center;
  }
  .palm-frond {
    position: absolute;
    height: 8px;
    background: #0e0e1e;
    border-radius: 0 50px 50px 0;
    transform-origin: left center;
  }
  .palm-tree:nth-child(13) { left: 5%; }
  .palm-tree:nth-child(13) .palm-trunk { height: 120px; }
  .palm-tree:nth-child(13) .palm-frond:nth-child(1) { width: 90px; transform: rotate(-25deg); }
  .palm-tree:nth-child(13) .palm-frond:nth-child(2) { width: 100px; transform: rotate(-55deg); }
  .palm-tree:nth-child(13) .palm-frond:nth-child(3) { width: 85px; transform: rotate(15deg); }
  .palm-tree:nth-child(13) .palm-frond:nth-child(4) { width: 95px; transform: rotate(40deg); }

  .palm-tree:nth-child(14) { right: 8%; }
  .palm-tree:nth-child(14) .palm-trunk { height: 150px; }
  .palm-tree:nth-child(14) .palm-frond:nth-child(1) { width: 110px; transform: rotate(-20deg); }
  .palm-tree:nth-child(14) .palm-frond:nth-child(2) { width: 120px; transform: rotate(-50deg); }
  .palm-tree:nth-child(14) .palm-frond:nth-child(3) { width: 100px; transform: rotate(20deg); }
  .palm-tree:nth-child(14) .palm-frond:nth-child(4) { width: 115px; transform: rotate(45deg); }

  .road {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 340px;
    background: linear-gradient(180deg, #1a1a1a 0%, #151515 100%);
  }
  .road-edge {
    position: absolute;
    top: 0; width: 100%; height: 3px;
    background: rgba(255,255,255,0.06);
  }
  .road-stripe {
    position: absolute;
    top: 48%;
    height: 8px;
    background: rgba(255,255,200,0.18);
    border-radius: 4px;
    animation: stripeMove 0.7s linear infinite;
  }
  .road-stripe:nth-child(2) { width: 90px; left: -90px; }
  .road-stripe:nth-child(3) { width: 90px; left: 200px; animation-delay: 0.14s; }
  .road-stripe:nth-child(4) { width: 90px; left: 490px; animation-delay: 0.28s; }
  .road-stripe:nth-child(5) { width: 90px; left: 780px; animation-delay: 0.42s; }

  .scooter-group {
    position: absolute;
    bottom: 350px;
    transition: left 3.5s ease-in-out;
  }

  /* ===== SCENE 5: Plane ===== */
  #scene5 {
    background: linear-gradient(180deg, #0a1230 0%, #152050 30%, #1a3070 60%, #2040a0 100%);
  }
  .cloud {
    position: absolute;
    border-radius: 80px;
  }
  .cloud-main {
    background: rgba(255,255,255,0.06);
    border-radius: 60px;
  }
  .cloud-puff {
    position: absolute;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .cloud:nth-child(1) { top: 15%; left: 2%; }
  .cloud:nth-child(1) .cloud-main { width: 260px; height: 70px; }
  .cloud:nth-child(1) .cloud-puff:nth-child(2) { width: 100px; height: 100px; top: -40px; left: 50px; }
  .cloud:nth-child(1) .cloud-puff:nth-child(3) { width: 80px; height: 80px; top: -30px; left: 130px; }
  .cloud:nth-child(2) { top: 45%; right: -3%; }
  .cloud:nth-child(2) .cloud-main { width: 320px; height: 80px; }
  .cloud:nth-child(2) .cloud-puff:nth-child(2) { width: 120px; height: 120px; top: -50px; left: 70px; }
  .cloud:nth-child(2) .cloud-puff:nth-child(3) { width: 90px; height: 90px; top: -35px; left: 170px; }
  .cloud:nth-child(3) { top: 70%; left: 20%; }
  .cloud:nth-child(3) .cloud-main { width: 200px; height: 55px; }
  .cloud:nth-child(3) .cloud-puff:nth-child(2) { width: 70px; height: 70px; top: -30px; left: 40px; }
  .cloud:nth-child(3) .cloud-puff:nth-child(3) { width: 55px; height: 55px; top: -20px; left: 110px; }

  .plane-group {
    position: absolute;
    transition: left 3s ease-in-out, top 3s ease-in-out;
  }

  .route-label {
    position: absolute;
    bottom: 26%;
    font-size: 84px;
    font-weight: 800;
    letter-spacing: 0.08em;
    opacity: 0;
    transition: all 0.5s ease;
    text-shadow: 0 4px 30px rgba(0,0,0,0.3);
  }
  .route-label.show { opacity: 1; }

  /* Contrail */
  .contrail {
    position: absolute;
    top: 50%;
    left: -20px;
    width: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15));
    border-radius: 2px;
    transition: width 3s ease-in-out;
  }
  .contrail.show { width: 600px; }

  /* ===== SCENE 6: Train ===== */
  #scene6 {
    background: linear-gradient(180deg, #111 0%, #0e0e0e 100%);
  }
  .train-group {
    position: absolute;
    bottom: 500px;
    transition: left 2s ease-out;
  }

  .platform-bar {
    position: absolute;
    bottom: 440px;
    width: 100%; height: 70px;
    background: linear-gradient(180deg, #333 0%, #2a2a2a 100%);
    border-top: 4px solid #555;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .platform-bar span {
    font-size: 28px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.5em;
    text-transform: uppercase;
  }
  .platform-floor {
    position: absolute;
    bottom: 0;
    width: 100%; height: 440px;
    background: linear-gradient(180deg, #1a1a1a, #151515);
  }
  .platform-tile {
    position: absolute;
    bottom: 0;
    height: 100%;
    width: 2px;
    background: rgba(255,255,255,0.03);
  }
  #scene6 .scene-text {
    position: absolute;
    top: 28%;
  }

  /* LED sign */
  .led-sign {
    position: absolute;
    top: 20%;
    background: #111;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 16px 40px;
  }
  .led-sign span {
    font-family: 'Courier New', monospace;
    font-size: 32px;
    color: #ffaa00;
    letter-spacing: 0.1em;
    text-shadow: 0 0 10px rgba(255,170,0,0.5);
  }

  /* ===== SCENE 7: Noodles ===== */
  #scene7 {
    background: radial-gradient(ellipse at 50% 55%, #2a1a0a 0%, #0a0a0a 70%);
  }

  /* ===== SCENE 8: Camera Works ===== */
  #scene8 {
    background: radial-gradient(ellipse at 50% 45%, #0a1a0a 0%, #0a0a0a 70%);
  }
  .flash-burst {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 900px; height: 900px;
    background: radial-gradient(circle, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.5) 25%, rgba(255,255,255,0) 60%);
    border-radius: 50%;
    transition: transform 0.5s ease-out, opacity 0.5s ease-out;
    opacity: 0;
  }
  .flash-burst.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
  .flash-burst.fade { opacity: 0; }

  .check-big {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 220px;
    color: #33ee55;
    font-weight: 900;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow: 0 0 80px rgba(50,240,80,0.4);
  }
  .check-big.show {
    transform: translate(-50%, -50%) scale(1);
  }

  /* Film strip decoration for scene 8 */
  .film-strip {
    position: absolute;
    width: 80px;
    background: repeating-linear-gradient(
      180deg,
      #222 0px, #222 20px,
      #0a0a0a 20px, #0a0a0a 24px
    );
    opacity: 0.3;
  }
  .film-strip-l { left: 40px; top: 0; height: 100%; }
  .film-strip-r { right: 40px; top: 0; height: 100%; }
  .film-perf {
    position: absolute;
    width: 16px; height: 12px;
    background: #0a0a0a;
    border-radius: 3px;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 1; }
  }
  @keyframes stripeMove {
    from { transform: translateX(0); }
    to { transform: translateX(-290px); }
  }
  @keyframes steamFloat {
    0% { opacity: 0.2; transform: translateY(0) scale(1); }
    50% { opacity: 0.1; }
    100% { opacity: 0; transform: translateY(-120px) scale(3.5); }
  }
  @keyframes wheelSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes bobFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
</style>
</head>
<body>

  <!-- Scene 1: Camera Misfire -->
  <div class="scene" id="scene1">
    <svg width="420" height="320" viewBox="0 0 420 320" style="margin-bottom:60px;filter:drop-shadow(0 12px 40px rgba(0,0,0,0.5))">
      <!-- Camera body -->
      <defs>
        <linearGradient id="camBody" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4a4a4a"/>
          <stop offset="100%" stop-color="#2a2a2a"/>
        </linearGradient>
        <linearGradient id="camGrip" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#333"/>
          <stop offset="100%" stop-color="#3a3a3a"/>
        </linearGradient>
        <radialGradient id="lensGrad" cx="40%" cy="40%">
          <stop offset="0%" stop-color="#2a2a3a"/>
          <stop offset="60%" stop-color="#111"/>
          <stop offset="100%" stop-color="#0a0a0a"/>
        </radialGradient>
        <radialGradient id="lensFlare" cx="35%" cy="35%">
          <stop offset="0%" stop-color="rgba(100,140,255,0.3)"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
      </defs>
      <!-- Main body -->
      <rect x="30" y="70" width="360" height="220" rx="20" fill="url(#camBody)"/>
      <!-- Grip -->
      <rect x="30" y="70" width="80" height="220" rx="20" fill="url(#camGrip)"/>
      <!-- Grip texture -->
      <line x1="45" y1="100" x2="45" y2="260" stroke="#444" stroke-width="2" stroke-dasharray="4,6"/>
      <line x1="55" y1="100" x2="55" y2="260" stroke="#444" stroke-width="2" stroke-dasharray="4,6"/>
      <line x1="65" y1="100" x2="65" y2="260" stroke="#444" stroke-width="2" stroke-dasharray="4,6"/>
      <line x1="75" y1="100" x2="75" y2="260" stroke="#444" stroke-width="2" stroke-dasharray="4,6"/>
      <!-- Pentaprism hump -->
      <path d="M 140 70 L 160 30 L 280 30 L 300 70" fill="#444"/>
      <rect x="160" y="30" width="120" height="40" rx="5" fill="#444"/>
      <!-- Hot shoe -->
      <rect x="190" y="22" width="60" height="10" rx="3" fill="#555"/>
      <!-- Viewfinder -->
      <rect x="195" y="38" width="50" height="24" rx="4" fill="#222"/>
      <rect x="200" y="42" width="40" height="16" rx="2" fill="#111"/>
      <!-- Lens mount ring -->
      <circle cx="230" cy="180" r="85" fill="#333" stroke="#444" stroke-width="3"/>
      <circle cx="230" cy="180" r="78" fill="#2a2a2a"/>
      <!-- Lens rings -->
      <circle cx="230" cy="180" r="72" fill="none" stroke="#3a3a3a" stroke-width="2"/>
      <circle cx="230" cy="180" r="66" fill="none" stroke="#383838" stroke-width="1.5"/>
      <!-- Inner lens -->
      <circle cx="230" cy="180" r="60" fill="url(#lensGrad)"/>
      <!-- Lens flare -->
      <circle cx="230" cy="180" r="60" fill="url(#lensFlare)"/>
      <!-- Aperture blades hint -->
      <circle cx="230" cy="180" r="30" fill="none" stroke="rgba(50,50,80,0.3)" stroke-width="1"/>
      <circle cx="230" cy="180" r="20" fill="#050510"/>
      <!-- Lens reflection dot -->
      <circle cx="215" cy="165" r="8" fill="rgba(150,180,255,0.15)"/>
      <circle cx="212" cy="162" r="3" fill="rgba(200,220,255,0.25)"/>
      <!-- Shutter button -->
      <circle cx="130" cy="55" r="16" fill="#666" stroke="#777" stroke-width="2"/>
      <circle cx="130" cy="55" r="10" fill="#555"/>
      <!-- Mode dial -->
      <rect x="310" y="45" width="50" height="25" rx="12" fill="#555"/>
      <line x1="335" y1="48" x2="335" y2="67" stroke="#777" stroke-width="1.5"/>
      <!-- Brand badge -->
      <rect x="280" y="85" width="80" height="16" rx="3" fill="rgba(255,255,255,0.06)"/>
      <!-- SD card slot hint -->
      <rect x="370" y="140" width="15" height="40" rx="3" fill="#333"/>
    </svg>
    <!-- Misfire X overlay -->
    <div style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none;">
      <svg id="misfireX" width="300" height="300" viewBox="0 0 300 300" style="position:absolute;top:calc(50% - 220px);opacity:0;transform:scale(0);transition:all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);">
        <circle cx="150" cy="150" r="120" fill="rgba(255,30,30,0.15)" stroke="#ff3333" stroke-width="8"/>
        <line x1="80" y1="80" x2="220" y2="220" stroke="#ff3333" stroke-width="12" stroke-linecap="round"/>
        <line x1="220" y1="80" x2="80" y2="220" stroke="#ff3333" stroke-width="12" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="scene-text" id="s1text">My camera misfired.</div>
  </div>

  <!-- Scene 2: Lost photos -->
  <div class="scene" id="scene2">
    <div class="photo-fragments">
      <div class="photo-frag" id="frag1"></div>
      <div class="photo-frag" id="frag2"></div>
      <div class="photo-frag" id="frag3"></div>
      <div class="photo-frag" id="frag4"></div>
    </div>
    <div class="scene-text" id="s2text" style="font-size:68px;position:relative;z-index:2;">I lost every single photo.</div>
  </div>

  <!-- Scene 3: So I flew back -->
  <div class="scene" id="scene3">
    <div class="scene-text" id="s3text" style="font-size:84px;font-weight:800;">So I flew back.</div>
  </div>

  <!-- Scene 4: 5am Scooter -->
  <div class="scene" id="scene4">
    <div class="stars">
      <div class="star"></div><div class="star"></div><div class="star"></div>
      <div class="star"></div><div class="star"></div><div class="star"></div>
      <div class="star"></div><div class="star"></div><div class="star"></div>
      <div class="star"></div><div class="star"></div><div class="star"></div>
    </div>
    <div class="moon">
      <div class="moon-crater"></div>
      <div class="moon-crater"></div>
      <div class="moon-crater"></div>
    </div>
    <!-- Palm trees -->
    <div class="palm-tree">

    [25.8, () => {
      document.getElementById('flashBurst').classList.add('fade');
      document.getElementById('checkBig').classList.add('show');
    }],
    [26.0, () => { document.getElementById('s8text').classList.add('show'); }],
    [28.0, () => { document.getElementById('scene8').classList.remove('active'); }],
  ];

  let started = false;
  function runTimeline() {
    if (started) return;
    started = true;
    const t0 = performance.now();
    let idx = 0;
    function tick() {
      const elapsed = (performance.now() - t0) / 1000;
      while (idx < timeline.length && timeline[idx][0] <= elapsed) {
        timeline[idx][1]();
        idx++;
      }
      if (idx < timeline.length) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  if (!location.search.includes('capture=1')) {
    runTimeline();
  }

  window.__applyUpTo = function(t) {
    for (let i = 0; i < timeline.length; i++) {
      if (timeline[i][0] <= t) timeline[i][1]();
    }
  };

  window.__timeline = timeline;

  if (location.search.includes('capture=1')) {
    const style = document.createElement('style');
    style.textContent = '*, *::before, *::after { transition-duration: 0s !important; }';
    document.head.appendChild(style);
  }
</script>
</body>
