<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0a0a0a;
    font-family: -apple-system, system-ui, sans-serif;
    color: white;
  }

  .scene {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .scene.active { opacity: 1; }

  /* ===== SCENE 1: Camera Misfire ===== */
  .camera-body {
    width: 360px; height: 260px;
    background: #3a3a3a;
    border-radius: 24px;
    position: relative;
    margin-bottom: 60px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  .camera-lens {
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 10px solid #555;
    background: #1a1a1a;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .camera-lens-inner {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: #111;
    border: 4px solid #333;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .camera-flash {
    width: 50px; height: 30px;
    background: #666;
    border-radius: 6px;
    position: absolute;
    top: -15px; right: 40px;
  }
  .camera-btn {
    width: 40px; height: 18px;
    background: #888;
    border-radius: 9px;
    position: absolute;
    top: -12px; left: 60px;
  }
  .misfire-x {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 160px;
    color: #ff3333;
    font-weight: 900;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow: 0 0 40px rgba(255,50,50,0.5);
  }
  .misfire-x.show {
    transform: translate(-50%, -50%) scale(1);
  }
  .scene-text {
    font-size: 72px;
    font-weight: 700;
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.5s ease;
    text-align: center;
    line-height: 1.2;
    padding: 0 60px;
  }
  .scene-text.show {
    opacity: 1;
    transform: translateY(0);
  }
  .scene-subtext {
    font-size: 48px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.5s ease;
    text-align: center;
    margin-top: 16px;
    padding: 0 60px;
  }
  .scene-subtext.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* ===== SCENE 4: Scooter ===== */
  #scene4 {
    background: linear-gradient(180deg, #060620 0%, #101035 30%, #1a1a2a 60%, #222 100%);
  }
  .stars {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 45%;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s ease-in-out infinite;
  }
  .star:nth-child(1) { width: 6px; height: 6px; top: 6%; left: 12%; }
  .star:nth-child(2) { width: 4px; height: 4px; top: 10%; left: 38%; animation-delay: 0.5s; }
  .star:nth-child(3) { width: 5px; height: 5px; top: 4%; left: 65%; animation-delay: 1s; }
  .star:nth-child(4) { width: 8px; height: 8px; top: 15%; left: 25%; animation-delay: 0.3s; }
  .star:nth-child(5) { width: 4px; height: 4px; top: 12%; left: 52%; animation-delay: 0.8s; }
  .star:nth-child(6) { width: 6px; height: 6px; top: 20%; left: 80%; animation-delay: 1.2s; }
  .star:nth-child(7) { width: 5px; height: 5px; top: 8%; left: 90%; animation-delay: 0.4s; }
  .star:nth-child(8) { width: 7px; height: 7px; top: 22%; left: 45%; animation-delay: 0.7s; }
  .star:nth-child(9) { width: 4px; height: 4px; top: 3%; left: 78%; animation-delay: 1.5s; }
  .star:nth-child(10) { width: 5px; height: 5px; top: 18%; left: 8%; animation-delay: 0.2s; }

  .time-big {
    position: absolute;
    top: 100px;
    font-size: 120px;
    font-weight: 800;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.05em;
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.5s ease;
  }
  .time-big.show { opacity: 1; transform: translateY(0); }

  .location-label {
    position: absolute;
    top: 240px;
    font-size: 40px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.15em;
    opacity: 0;
    transition: all 0.5s ease;
  }
  .location-label.show { opacity: 1; }

  .road {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 350px;
    background: #1a1a1a;
  }
  .road-stripe {
    position: absolute;
    top: 45%;
    height: 6px;
    background: rgba(255,255,200,0.2);
    border-radius: 3px;
    animation: stripeMove 0.8s linear infinite;
  }
  .road-stripe:nth-child(1) { width: 80px; left: -80px; }
  .road-stripe:nth-child(2) { width: 80px; left: 180px; animation-delay: 0.15s; }
  .road-stripe:nth-child(3) { width: 80px; left: 440px; animation-delay: 0.3s; }
  .road-stripe:nth-child(4) { width: 80px; left: 700px; animation-delay: 0.45s; }
  .road-stripe:nth-child(5) { width: 80px; left: 960px; animation-delay: 0.6s; }

  .scooter-group {
    position: absolute;
    bottom: 340px;
    transition: left 3.5s ease-in-out;
  }
  .scooter-chassis {
    width: 220px; height: 90px;
    position: relative;
  }
  .sc-body {
    position: absolute;
    bottom: 45px; left: 25px;
    width: 140px; height: 35px;
    background: #555;
    border-radius: 18px 18px 4px 4px;
  }
  .sc-handlebar {
    position: absolute;
    bottom: 65px; right: 15px;
    width: 12px; height: 50px;
    background: #777;
    border-radius: 6px;
  }
  .sc-wheel {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 8px solid #666;
    background: #2a2a2a;
    position: absolute;
    bottom: 0;
  }
  .sc-wheel-f { right: 0; }
  .sc-wheel-b { left: 8px; }
  .sc-headlight {
    position: absolute;
    bottom: 38px; right: -8px;
    width: 18px; height: 14px;
    background: #ffee88;
    border-radius: 4px;
    box-shadow: 0 0 30px #ffee88, 0 0 80px rgba(255,238,136,0.4), 40px -5px 60px rgba(255,238,136,0.15);
  }
  .sc-rider {
    position: absolute;
    bottom: 75px; left: 50px;
  }
  .sc-rider-head {
    width: 40px; height: 40px;
    background: #c8a882;
    border-radius: 50%;
    margin: 0 auto -6px;
  }
  .sc-rider-body {
    width: 44px; height: 55px;
    background: #444;
    border-radius: 12px 12px 6px 6px;
  }

  /* ===== SCENE 5: Plane ===== */
  #scene5 {
    background: linear-gradient(180deg, #0f1a3a 0%, #1a2a5a 50%, #2a3a6a 100%);
  }
  .plane-group {
    position: absolute;
    transition: left 3s ease-in-out, top 3s ease-in-out;
  }
  .plane-fuselage {
    width: 280px; height: 70px;
    background: white;
    border-radius: 35px 70px 70px 35px;
    position: relative;
    box-shadow: 0 4px 30px rgba(0,0,0,0.3);
  }
  .plane-wing-top {
    position: absolute;
    top: -25px; left: 70px;
    width: 120px; height: 30px;
    background: rgba(255,255,255,0.85);
    border-radius: 6px;
    transform: skewX(-8deg);
  }
  .plane-tail-fin {
    position: absolute;
    top: -35px; left: 0;
    width: 35px; height: 50px;
    background: rgba(255,255,255,0.85);
    border-radius: 6px 6px 0 0;
    transform: skewX(15deg);
  }
  .plane-win {
    position: absolute;
    top: 22px;
    width: 16px; height: 16px;
    background: #3a5a9a;
    border-radius: 50%;
  }
  .plane-win:nth-child(3) { right: 50px; }
  .plane-win:nth-child(4) { right: 80px; }
  .plane-win:nth-child(5) { right: 110px; }
  .plane-win:nth-child(6) { right: 140px; }

  .cloud {
    position: absolute;
    background: rgba(255,255,255,0.06);
    border-radius: 60px;
    height: 60px;
  }
  .cloud:nth-child(1) { width: 200px; top: 20%; left: 5%; }
  .cloud:nth-child(2) { width: 300px; top: 50%; right: -5%; }
  .cloud:nth-child(3) { width: 160px; top: 72%; left: 25%; }

  .route-label {
    position: absolute;
    bottom: 28%;
    font-size: 80px;
    font-weight: 800;
    letter-spacing: 0.08em;
    opacity: 0;
    transition: all 0.5s ease;
  }
  .route-label.show { opacity: 1; }

  /* ===== SCENE 6: Train ===== */
  #scene6 { background: #111; }
  .train-group {
    position: absolute;
    bottom: 480px;
    transition: left 2s ease-out;
  }
  .train-body {
    width: 500px; height: 160px;
    background: linear-gradient(180deg, #3a7acc 0%, #2a5aaa 100%);
    border-radius: 12px;
    position: relative;
    box-shadow: 0 6px 30px rgba(0,0,0,0.4);
  }
  .train-stripe {
    position: absolute;
    bottom: 30px;
    width: 100%; height: 6px;
    background: rgba(255,255,255,0.2);
  }
  .train-win {
    width: 70px; height: 60px;
    background: rgba(255,255,200,0.35);
    border-radius: 6px;
    display: inline-block;
    margin: 20px 0 0 18px;
  }
  .train-whl {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: #333;
    border: 7px solid #555;
    position: absolute;
    bottom: -25px;
  }
  .train-whl:nth-child(6) { left: 50px; }
  .train-whl:nth-child(7) { left: 150px; }
  .train-whl:nth-child(8) { right: 150px; }
  .train-whl:nth-child(9) { right: 50px; }
  .platform-bar {
    position: absolute;
    bottom: 420px;
    width: 100%; height: 60px;
    background: #2a2a2a;
    border-top: 4px solid #444;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .platform-bar span {
    font-size: 24px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.4em;
    text-transform: uppercase;
  }
  #scene6 .scene-text {
    position: absolute;
    top: 30%;
  }

  /* ===== SCENE 7: Noodles ===== */
  .bowl-group {
    position: relative;
    margin-bottom: 50px;
  }
  .bowl-shape {
    width: 340px; height: 170px;
    background: #f5f5f0;
    border-radius: 0 0 170px 170px;
    position: relative;
    overflow: hidden;
  }
  .bowl-rim {
    position: absolute;
    top: -12px; left: -25px;
    width: 390px; height: 30px;
    background: #f5f5f0;
    border-radius: 15px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
  }
  .noodle {
    position: absolute;
    height: 5px;
    background: #ddb866;
    border-radius: 3px;
  }
  .noodle:nth-child(2) { width: 140px; top: 30px; left: 40px; transform: rotate(-4deg); }
  .noodle:nth-child(3) { width: 160px; top: 50px; left: 60px; transform: rotate(3deg); }
  .noodle:nth-child(4) { width: 120px; top: 70px; left: 30px; transform: rotate(-2deg); }
  .noodle:nth-child(5) { width: 150px; top: 90px; left: 50px; transform: rotate(5deg); }
  .noodle:nth-child(6) { width: 130px; top: 110px; left: 70px; transform: rotate(-3deg); }

  .chopstick {
    position: absolute;
    width: 10px; height: 200px;
    background: linear-gradient(180deg, #6B3410 0%, #8B5A2B 100%);
    border-radius: 5px;
    transform-origin: bottom center;
    top: -120px;
  }
  .chopstick:nth-child(7) { right: 90px; transform: rotate(-10deg); }
  .chopstick:nth-child(8) { right: 65px; transform: rotate(7deg); }

  .steam-puff {
    position: absolute;
    background: rgba(255,255,255,0.12);
    border-radius: 50%;
    animation: steamFloat 2.5s ease-out infinite;
  }
  .steam-puff:nth-child(9) { width: 40px; height: 40px; top: -60px; left: 80px; }
  .steam-puff:nth-child(10) { width: 30px; height: 30px; top: -50px; left: 150px; animation-delay: 0.8s; }
  .steam-puff:nth-child(11) { width: 35px; height: 35px; top: -55px; left: 220px; animation-delay: 1.5s; }

  /* ===== SCENE 8: Camera Works ===== */
  .flash-burst {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 800px; height: 800px;
    background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 60%);
    border-radius: 50%;
    transition: transform 0.5s ease-out, opacity 0.5s ease-out;
    opacity: 0;
  }
  .flash-burst.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
  .flash-burst.fade {
    opacity: 0;
  }
  .check-big {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 200px;
    color: #33dd33;
    font-weight: 900;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow: 0 0 60px rgba(50,220,50,0.4);
  }
  .check-big.show {
    transform: translate(-50%, -50%) scale(1);
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }
  @keyframes stripeMove {
    from { transform: translateX(0); }
    to { transform: translateX(-260px); }
  }
  @keyframes steamFloat {
    0% { opacity: 0.15; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-100px) scale(3); }
  }
</style>
</head>
<body>

  <!-- Scene 1: Camera Misfire -->
  <div class="scene" id="scene1">
    <div class="camera-body">
      <div class="camera-lens"><div class="camera-lens-inner"></div></div>
      <div class="camera-flash"></div>
      <div class="camera-btn"></div>
      <div class="misfire-x" id="misfireX">✕</div>
    </div>
    <div class="scene-text" id="s1text">My camera misfired.</div>
  </div>

  <!-- Scene 2: Lost photos -->
  <div class="scene" id="scene2">
    <div class="scene-text" id="s2text" style="font-size:68px">I lost every single photo.</div>
  </div>

  <!-- Scene 3: So I flew back -->
  <div class="scene" id="scene3">
    <div class="scene-text" id="s3text" style="font-size:80px">So I flew back.</div>
  </div>

  <!-- Scene 4: 5am Scooter -->
  <div class="scene" id="scene4">
    <div class="stars">
      <div class="star"></div><div class="star"></div><div class="star"></div>
      <div class="star"></div><div class="star"></div><div class="star"></div>
      <div class="star"></div><div class="star"></div><div class="star"></div>
      <div class="star"></div>
    </div>
    <div class="time-big" id="timeBig">5:00 AM</div>
    <div class="location-label" id="locLabel">Ungasan, Bali</div>
    <div class="road">
      <div class="road-stripe"></div><div class="road-stripe"></div>
      <div class="road-stripe"></div><div class="road-stripe"></div>
      <div class="road-stripe"></div>
    </div>
    <div class="scooter-group" id="scooterGroup" style="left:-250px">
      <div class="sc-rider">
        <div class="sc-rider-head"></div>
        <div class="sc-rider-body"></div>
      </div>
      <div class="scooter-chassis">
        <div class="sc-body"></div>
        <div class="sc-handlebar"></div>
        <div class="sc-wheel sc-wheel-b"></div>
        <div class="sc-wheel sc-wheel-f"></div>
        <div class="sc-headlight"></div>
      </div>
    </div>
  </div>

  <!-- Scene 5: Plane -->
  <div class="scene" id="scene5">
    <div class="cloud"></div><div class="cloud"></div><div class="cloud"></div>
    <div class="plane-group" id="planeGroup" style="left:-350px;top:45%">
      <div class="plane-fuselage">
        <div class="plane-wing-top"></div>
        <div class="plane-tail-fin"></div>
        <div class="plane-win"></div>
        <div class="plane-win"></div>
        <div class="plane-win"></div>
        <div class="plane-win"></div>
      </div>
    </div>
    <div class="route-label" id="routeLabel">BALI → KL</div>
  </div>

  <!-- Scene 6: Train -->
  <div class="scene" id="scene6">
    <div class="scene-text" id="s6text" style="position:absolute;top:28%">Took the train into town.</div>
    <div class="platform-bar"><span>KL Sentral</span></div>
    <div class="train-group" id="trainGroup" style="left:1200px">
      <div class="train-body">
        <div class="train-win"></div><div class="train-win"></div>
        <div class="train-win"></div><div class="train-win"></div><div class="train-win"></div>
        <div class="train-stripe"></div>
        <div class="train-whl"></div><div class="train-whl"></div>
        <div class="train-whl"></div><div class="train-whl"></div>
      </div>
    </div>
  </div>

  <!-- Scene 7: Noodles -->
  <div class="scene" id="scene7">
    <div class="bowl-group">
      <div class="bowl-shape">
        <div class="bowl-rim"></div>
        <div class="noodle"></div><div class="noodle"></div><div class="noodle"></div>
        <div class="noodle"></div><div class="noodle"></div>
      </div>
      <div class="chopstick"></div><div class="chopstick"></div>
      <div class="steam-puff"></div><div class="steam-puff"></div><div class="steam-puff"></div>
    </div>
    <div class="scene-text" id="s7text" style="font-size:56px">Noodles first.</div>
    <div class="scene-subtext" id="s7sub">Obviously.</div>
  </div>

  <!-- Scene 8: Camera Works -->
  <div class="scene" id="scene8">
    <div class="camera-body" style="margin-bottom:60px">
      <div class="camera-lens"><div class="camera-lens-inner"></div></div>
      <div class="camera-flash"></div>
      <div class="camera-btn"></div>
      <div class="flash-burst" id="flashBurst"></div>
      <div class="check-big" id="checkBig">✓</div>
    </div>
    <div class="scene-text" id="s8text">This time it worked.</div>
  </div>

<script>
  // Timeline-driven animation for frame-by-frame capture
  // window.__currentTime is set externally by the capture script
  window.__currentTime = 0;

  const timeline = [
    // [startTime, action]
    [0, () => { document.getElementById('scene1').classList.add('active'); }],
    [0.8, () => { document.getElementById('misfireX').classList.add('show'); }],
    [1.2, () => { document.getElementById('s1text').classList.add('show'); }],
    [3.2, () => { document.getElementById('scene1').classList.remove('active'); }],

    [3.5, () => { document.getElementById('scene2').classList.add('active'); }],
    [3.8, () => { document.getElementById('s2text').classList.add('show'); }],
    [5.8, () => { document.getElementById('scene2').classList.remove('active'); }],

    [6.2, () => { document.getElementById('scene3').classList.add('active'); }],
    [6.5, () => { document.getElementById('s3text').classList.add('show'); }],
    [8.5, () => { document.getElementById('scene3').classList.remove('active'); }],

    [9.0, () => {
      document.getElementById('scene4').classList.add('active');
    }],
    [9.3, () => {
      document.getElementById('timeBig').classList.add('show');
    }],
    [9.8, () => {
      document.getElementById('locLabel').classList.add('show');
      document.getElementById('scooterGroup').style.left = '1200px';
    }],
    [13.0, () => { document.getElementById('scene4').classList.remove('active'); }],

    [13.5, () => {
      document.getElementById('scene5').classList.add('active');
    }],
    [13.8, () => {
      document.getElementById('planeGroup').style.left = '1200px';
      document.getElementById('planeGroup').style.top = '30%';
    }],
    [14.2, () => {
      document.getElementById('routeLabel').classList.add('show');
    }],
    [17.0, () => { document.getElementById('scene5').classList.remove('active'); }],

    [17.5, () => {
      document.getElementById('scene6').classList.add('active');
    }],
    [17.8, () => {
      document.getElementById('s6text').classList.add('show');
      document.getElementById('trainGroup').style.left = '290px';
    }],
    [20.5, () => { document.getElementById('scene6').classList.remove('active'); }],

    [21.0, () => {
      document.getElementById('scene7').classList.add('active');
    }],
    [21.3, () => { document.getElementById('s7text').classList.add('show'); }],
    [21.8, () => { document.getElementById('s7sub').classList.add('show'); }],
    [24.0, () => { document.getElementById('scene7').classList.remove('active'); }],

    [24.5, () => {
      document.getElementById('scene8').classList.add('active');
    }],
    [25.3, () => {
      document.getElementById('flashBurst').classList.add('show');
    }],
    [25.8, () => {
      document.getElementById('flashBurst').classList.add('fade');
      document.getElementById('checkBig').classList.add('show');
    }],
    [26.0, () => { document.getElementById('s8text').classList.add('show'); }],
    [28.0, () => { document.getElementById('scene8').classList.remove('active'); }],
  ];

  // For real-time playback (preview in browser)
  let started = false;
  function runTimeline() {
    if (started) return;
    started = true;
    const t0 = performance.now();
    let idx = 0;
    function tick() {
      const elapsed = (performance.now() - t0) / 1000;
      while (idx < timeline.length && timeline[idx][0] <= elapsed) {
        timeline[idx][1]();
        idx++;
      }
      if (idx < timeline.length) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  // Auto-start for preview (disabled when capture script sets ?capture=1)
  if (!location.search.includes('capture=1')) {
    runTimeline();
  }

  // Expose for programmatic control
  window.__applyUpTo = function(t) {
    for (let i = 0; i < timeline.length; i++) {
      if (timeline[i][0] <= t) timeline[i][1]();
    }
  };

  // Expose timeline for capture script
  window.__timeline = timeline;

  // In capture mode, disable CSS transitions so we control movement manually
  if (location.search.includes('capture=1')) {
    const style = document.createElement('style');
    style.textContent = '*, *::before, *::after { transition-duration: 0s !important; }';
    document.head.appendChild(style);
  }
</script>
</body>
</html>
