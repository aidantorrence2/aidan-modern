<!DOCTYPE html>
<html>
<head>
  <title>Meta Pixel Test</title>
</head>
<body>
  <h1>Meta Pixel Lead Event Test</h1>
  <button id="test-btn" style="padding: 10px 20px; background: #25D366; color: white; border: none; cursor: pointer;">
    Test Lead Event
  </button>
  <div id="output" style="margin-top: 20px; font-family: monospace;"></div>

  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    
    fbq('init', '19217687771718409');
    fbq('track', 'PageView');
    
    const output = document.getElementById('output');
    output.innerHTML += 'PageView tracked<br>';
    
    document.getElementById('test-btn').addEventListener('click', function() {
      if (typeof window !== 'undefined' && window.fbq) {
        window.fbq('track', 'Lead', {
          content_name: 'Chiang Mai Free Photo Shoot',
          content_category: 'WhatsApp Lead'
        });
        output.innerHTML += 'Lead event fired!<br>';
        console.log('Lead event tracked');
      } else {
        output.innerHTML += 'ERROR: fbq not found<br>';
      }
    });
  </script>
</body>
</html>
